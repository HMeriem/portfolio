services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://backend:4000}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-4000}
    volumes:
      - ./backend/src:/app/src
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s